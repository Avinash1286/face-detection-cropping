name: Build & Release

on:
  push:
    tags:
      - 'v*'   # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger

jobs:
  # ──────────────────────────────────────────────
  # Windows Build
  # ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Convert PNG to ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('public/logo.png')
          img.save('public/logo.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          "

      - name: Build with PyInstaller
        run: pyinstaller run.spec

      - name: Zip output
        run: Compress-Archive -Path dist/FaceCrop/* -DestinationPath FaceCrop-Windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaceCrop-Windows
          path: FaceCrop-Windows.zip

  # ──────────────────────────────────────────────
  # macOS Build
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Convert PNG to ICNS
        run: |
          mkdir -p logo.iconset
          sips -z 16 16     public/logo.png --out logo.iconset/icon_16x16.png
          sips -z 32 32     public/logo.png --out logo.iconset/icon_16x16@2x.png
          sips -z 32 32     public/logo.png --out logo.iconset/icon_32x32.png
          sips -z 64 64     public/logo.png --out logo.iconset/icon_32x32@2x.png
          sips -z 128 128   public/logo.png --out logo.iconset/icon_128x128.png
          sips -z 256 256   public/logo.png --out logo.iconset/icon_128x128@2x.png
          sips -z 256 256   public/logo.png --out logo.iconset/icon_256x256.png
          sips -z 512 512   public/logo.png --out logo.iconset/icon_256x256@2x.png
          sips -z 512 512   public/logo.png --out logo.iconset/icon_512x512.png
          sips -z 1024 1024 public/logo.png --out logo.iconset/icon_512x512@2x.png
          iconutil -c icns logo.iconset -o public/logo.icns

      - name: Build with PyInstaller
        run: pyinstaller run.spec

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -r dist/FaceCrop dmg_contents/
          hdiutil create -volname "FaceCrop" -srcfolder dmg_contents -ov -format UDZO FaceCrop-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaceCrop-macOS
          path: FaceCrop-macOS.dmg

  # ──────────────────────────────────────────────
  # Create GitHub Release with both builds
  # ──────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FaceCrop-Windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: FaceCrop-macOS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            FaceCrop-Windows.zip
            FaceCrop-macOS.dmg
